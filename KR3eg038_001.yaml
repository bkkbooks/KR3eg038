body:
  text: 卷上辨證瘴瘧形狀或問曰發熱頭痛人俱稱為傷寒一以傷寒藥治之可乎豫曰當有所辨諸般發熱種種不一而最毒者在內傷有瘴瘧或曰若內傷果有東垣內外傷論辨別詳晰甚為有理若醫瘴瘧則不能無疑矣將以豫為妄吾見子治斯病活人甚多但未聞是書未聆是語當明以告我豫曰傷寒內傷所病處廣況立法者乃仲景東垣二人聖醫也名重寰宇而擴充是法者陶節庵薛立齋二君故其書傳之廣而心於活人者未有不讀也若夫瘴瘧惟炎方有之僻於一偶況業醫者鮮惜李待制治瘴之聖其書所傳不廣宜乎吾子之未聞是書未聆是語或曰既有是書其病形可得聞歟豫曰其病有三而形狀不外於頭痛發熱腰重腳軟或冷或嘔或泄或大便祕或小便赤面赤目紅口渴心煩胸中大熱舌或黑狂言譫語欲飲水欲坐水中或吐血或衄血或腹痛或有汗或無汗諸證以有寒有熱者為寒瘴或間日或不間日為易治以單熱不寒者為熱瘴為難治得間日猶可以不言語惟噫噫作聲者為啞瘴為不治瘴瘧之形狀大都如是矣人身肖天地瘴瘧類天時天以一氣覆於上地以一氣載於下人居覆載中若何能與覆我載我者相肖也上古聖人等天地人為三才豈無灼見而妄立説耶蓋謂天以輕清之氣上浮而下轉地居其中而乾健之運無一毫少息若一毫不續則穹壤判一息不運則機緘窮人身肖之其氣亦無息天以日月循環人以榮衛循環地有九州人有九竅經曰天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾風氣通於腎六經為川腸胃為海九竅為水注之氣陽之汗以雨名陽之氣以風名人之一身身以上其氣象天身以下其氣象地故天不足西北而人之耳目右不如左之聰明也故西北之人頭常冷地不滿東南而人之手足左不如右之利便也故東南之人腰足常冷天有陰陽以生風暑濕燥寒地有陰陽以生木火土金水人有陰陽以生肝心脾肺腎天氣以四時溫熱涼寒運於上地氣以生長收藏應於下而人之陽氣以升浮降沉應之為生生不息之妙何也天令春其氣溫惟其氣溫故地中之陽氣鼓動而升於外以生萬物人之陽氣亦應之以升天令夏其氣熱惟其氣熱地中之陽氣盡出於外以長萬物所以地之下極寒人之陽氣亦應之盡出於外脾坤土也象地斯時脾土亦寒天令秋其氣涼惟其氣涼所以陽氣能降於地而行收成之令人之陽氣亦應之而降於內天令冬其氣寒惟其氣寒陽氣盡沉於地而成閉藏之令所以地之下暖人之陽氣亦應之沉藏於內斯時脾土亦暖此天地得其常而人之災害亦不生發瘴之地則不然春夏多寒秋冬多熱盛夏久雨則可挾纊隆冬久晴寧不搖扇一日之間日未升則寒日中則熱日入又寒一日一夜寒暑迭變無論四時久晴則熱蒸蒸極則雨雨下則濕蒸雨久則淒涼人生其間飲食起居安能一一謹慎稍失調養便感此乖戾之氣而發寒熱即謂之瘴然瘴之發多在秋冬以其天氣熱地中之陽氣不能收藏而外泄故草木不花而花不葉而葉人之陽氣亦應之不能收固而恆泄之於外惟其外泄則脾土所以內虛寒身以上象天則極熱身以下象地則不熱而寒或熱蒸極而汗汗出則淒涼其人身之寒熱濕蒸一與天時相似故曰人身肖天地瘴瘧類天時知斯道者則治瘴之法過半矣受病之源南方之地寒暑不時春夏淫雨則多寒晨夕霧昏地下濕蒸故陰濕之氣常盛秋冬久晴則多熱草木不凋而放花故陽燠之氣恆泄晝燠夜寒晴霽熱陰雨寒人居其中因寒濕之氣盛故下體重濕生痰又多痰因秋冬熱故熱多上壅膚多出汗至腠理不密陽外而陰內陽浮而陰閉於斯時也若飲食失度起居不時及食生冷食炙煿則痰與食相併積於胃而寒熱之病作矣或不避暑奔走於日中或避暑而坐臥當風閉其汗孔使汗不出此病亦因之而作或因其晨多霧而寒飲酒以御之少焉日出而熱則酒與痰相併滯於膈上此病亦因之而作或晨寒而少衣或夜冷而薄衾則寒與痰相併亦作寒熱或因晨寒多衣行至日中未解則暑與痰相併亦作寒熱要之此病之本本於天氣熱元陽恆泄在人之陽氣自不降而內又多痰再不能調攝感於不正之氣宜其病有上熱下寒之症所謂無痰不成瘧者是也養生者能遠房室省勞役毋食生冷毋食炙煿毋醉早酒毋飽晚飯毋乘暑行走毋當風坐臥一日之中順其寒暑而加減衣裳則瘴雖毒庶可免矣瘴瘧傷寒辨外傷寒邪之症與瘴瘧俱有寒熱醫者盡以瘴瘧作傷寒率用汗吐下之法治之其枉死者不可勝計由其不辨寒熱症候耳今細分之經曰冬傷於寒春必病瘟冬若即病謂之傷寒不即病至春變為瘟病至夏變為熱病其病也多自太陽經始故發熱惡寒頭痛脊強無汗口中和而不惡食脈浮緊為傷寒或惡風自汗而脈浮緩為傷風其熱無退時若傳經或傳陽明經則有目痛鼻乾不得眠脈長之症或傳少陽經則有耳聾脅痛口苦嘔吐舌白苔脈弦之症若傳陽明腑病為入里舌苔黃口渴心煩舌乾不惡寒反惡熱揚擲手足揭去衣被狂言譫語脈洪數內實之證宜用下劑下遲則入陰經方舌黑大凡傷寒之熱全不間斷直至傳入里下後方罷經曰夏傷於暑秋必痎瘧夏暑汗不出秋成風瘧是知瘧之發多因於暑故發瘴之地四時常似夏其病也無傳經若是冷瘴則有惡寒發熱頭痛腳弱腰重口中不和嘔吐或不嘔吐脈弦帶數一呼一吸脈來六至或七至八至或先寒後熱或先熱後寒方其寒也脈則沉遲而伏及其熱也脈則六至七至而弦洪渴欲飲水飲則多吐揭去衣被待其汗出熱則退矣或無汗而熱久亦退或間日再發或一日一發此為輕症若是熱瘴則不惡寒惟發熱壯熱頭痛身倦腰重腳弱煩躁胸膈不利嘔逆或不嘔逆自利或不自利小便赤澀口渴脈洪弦七至八至熱亦不間斷一日二日舌便黑目紅面赤渴欲飲冷與之水亦能飲狂言譫語或大便閉至日晡尤甚與傷寒下症無異細察之身中之熱有不熱處以手捫之額上極熱面微熱黃尖涼心胸及腹極熱背微熱腰以下不甚熱重者常冷或厥且譫語以手捫心胸蜷臥狂起則腳重無力何也瘴病是上熱下寒故腰以下不熱而沉重上身之症雖陽而陰症隱具於其中鼻尖為年壽宮年壽屬脾脾寒所以鼻尖涼此病是外熱內寒熱症雖見於外而內寒之症驗於鼻涼蜷臥叉手胃胸隱然見矣或謂是傷寒陰症似陽亦非是若陰症似陽渴欲飲冷與之冷則不飲瘴病與之則能飲若用藥得宜則熱退或得間日熱退時則脈微弱非復前之洪弦數矣大抵瘴與傷寒大不相同傷寒因於寒瘴病因於暑傷寒有傳經有變症有傳染而瘴病不傳經無變症不傳染若醫者誤認惡寒發熱為表症用傷寒汗藥以狂言譫語大便祕舌黑為里症用傷寒下藥則不旋踵而告變矣瘴瘧內傷辨內傷飲食勞役過度之病其發熱惡寒與瘴瘧相似若以瘴瘧而用內傷勞役之藥治之則神識昏亂譫語如狂其熱愈劇服多亦至不起由不細察其症候耳今細辨之內傷勞役之病其惡寒也見風見寒居陰處無日陽處則惡之若避風寒居溫暖處或添衣被則不惡也或雖發寒一暖便已其發熱也蒸蒸然上徹頭頂旁徹皮毛下至腰足渾身燥熱若袒衣被近寒涼處則已或熱極而汗出亦解若涼片時即惡寒添衣被則不惡寒又發熱直至甘溫之劑進多則病已其他頭痛身重手心熱口渴心煩舌黑妄語妄有見聞大便祕或沸小便赤澀或嘔口不知味其脈氣口洪大或兼各臟形症內傷之病如此瘴瘧之作其寒也先起於毫毛伸欠乃作寒栗鼓領腰杳俱痛雖重衣厚被滾湯熱火不能溫寒去則內外皆熱渴欲飲冷雖袒去衣被重冰泉水不能寒或先寒後熱或先熱後寒或一日一發或間日一發或一日二三發此是冷瘴其脈洪弦數冷瘴與內傷其寒熱不同又如此惟熱瘴熱未間斷時又當細辨之內傷之熱渾身上下皆熱熱瘴之熱惟額極熱胸腹極熱腰以下則不熱足發厥又易辨之亦有足熱者雖熱亦不甚內傷之熱袒去衣被即解片時熱瘴之熱即臥於冷地亦不解內傷之脈氣口獨洪大而六至熱瘴之脈六脈俱弦洪而七八至或陽症而見陰脈要之兼症雖多惟以寒熱及脈潛心分別則瘴瘧內傷若冰炭矣苟誤認瘴瘧為內傷而用補中益氣湯則熱愈劇而神愈昏蓋瘴因陽氣不降而然升麻柴胡乃輕清升藥使不降之陽氣愈飛越矣瘴乃類天時天氣鬱蒸得雨方解瘴之熱悶欲俟下元溫固自然出汗方舒黃耆白朮斂腠理藥也使腠理閉塞汗不得出愈加熱悶神昏矣若是內傷此藥一進病勢即漸減縱不減亦不加病之疑難如此醫者不明望聞問切之理不分別其內傷瘴瘧傷寒而妄為施治者屠劊之流也諸瘧瘴瘧辨或曰傷寒內傷瘴瘧之不同已知之矣敢問瘴與瘧何以辨之豫曰有三陽經瘧三陰經瘧五臟瘧又有以寒多熱少者及單寒者名寒瘧寒熱相半者名溫瘧單熱不寒者名單瘧胸膈痰痞心下脹滿氣逆煩嘔為痰瘧噫氣吞酸胸腹脹吐酸惡酸惡食為食瘧惡風自汗筋骨痛抽搐為風瘧面垢口渴心煩多汗為暑瘧三日一發久而不愈為痎瘧表裡俱虛客邪未散真氣不復間一日連二日發或疾雖間遇勞即發久而不瘥為勞瘧進退無時進則神昏退則如常為鬼瘧久而不瘳膈下結塊為瘧母發於陽者為牡瘧發於陰者為牝瘧雖種種不同其大略不外於一日一發或二日一發三日一發有間一日連二日發有一日兩發有日與夜各發有上半日發有下半日發有有汗有無汗此一定之規若瘴瘧只是三症以有寒者為寒瘴單熱者為熱瘴不語者為啞瘴其始發也多不間斷重者七日方間斷其間斷也一日十二時只間一二時即發亦有間斷半日者退去時莫起動則可若起動則發又終屬難退即退去胸腹之熱尚在或間一日一發者其發時去死一間其退去之時渾身上下筋骨若無其難過也不可以言語形容非若諸瘧退去之時即如平人又或先輕後重或先重後輕或先間斷而後反不間斷或先不間斷而後間斷變怪不常非若諸瘧作息自有定期以此辨別皎若日星其治諸瘧用藥錯者尚可救療瘴瘧用藥一錯禍如反掌瘴最忌者汗吐下及小柴胡湯柴苓湯解肌湯其故何也蓋瘴因陽氣外泄而然發汗之藥多驅內陽外泄是重虛其內所以多死瘴因陽氣不降於下焦吐則陽氣愈上升下元無陽氣是無根也故死瘴疾是下真寒而上假熱下藥太寒一下咽則中寒大作陽氣隨之即脫所以死極速瘴病外雖熱而內實寒故人謂瘴疾為脾寒正謂瘴也故小柴胡柴苓解肌之類其性俱大寒服之則外熱不降而內寒更甚故至外熱微時裡外俱無陽氣所以難救欲治斯病醫者自首至尾不同妄用一藥只遵大法溫中鎮下正氣相解且攻且守主病者無責速效病者能慎疾則治自愈萬不失一矣若夫啞瘴當歸之天命千百中可救一二非人力之所能為也傷寒瘴瘧分南北辨或曰如子之言傷寒因於寒瘴瘧因於熱則北地多寒傷寒乃北方之病南地多熱瘴瘧乃南方之病歟豫曰子言亦有理上古聖人亦有異法方宜之論然不可執一不通第曰北方傷寒病多南方瘴瘧病多則可若曰北方無瘴瘧南方無傷寒則不可蓋天道無常假令北方暑熱過多秋時暴熱數日北人感此氣亦多病瘴廣之東南設有冬時大寒數日南方素無寒若感此氣亦多病傷寒故醫者當上察天時四時溫涼寒熱上明五運六氣司天在泉之理下察四方風土之宜中辨病人平日之性宜涼宜熱平日是何脈再審今病或外傷風寒暑濕或內傷飲食勞役七情男女或感乖戾之氣而為瘴灼見其病之在何經何臟宜補宜瀉宜吐宜汗宜溫宜和解萬舉萬全庶不愧為醫矣瘴瘧五臟俱病夫人身自胸膈至頭為上焦其氣象天自胸膈至腹為中焦其氣象人自腹至足為下焦其氣象地以五行論之上焦屬丙丁火中焦屬戊己土下焦屬壬癸水在五臟心肺陽也居上脾陰坤土也居中腎肝陰也居下必也陰能升陽能降以成水火之既濟天地之交泰則為平人若夫發瘴之地秋冬多熱則人身陰陽之氣上者自上下者自下而成水火之未濟天地不交之否故一觸外邪五臟俱病其病多上熱下寒外熱內寒何也天氣通於肺天氣熱故肺熱極所以大渴引飲小便頻數或遺尿氣逆胸中痞悶或衄血心在上焦火位天氣熱故心熱極所以心煩悶亂狂言譫語神識昏沉瞀不知人或吐血飲冷舌黑麵紅口唇生瘡脾為中州坤土天氣熱則地中陽氣恆浮而不降地下無陽則寒故脾土虛所以鼻尖涼多痰肌肉削不能食麵黃四肢無力或嘔或泄中焦虛痞氣倦怠肝腎居下焦地之分天氣熱陽氣不降地下無陽故肝腎虛寒所以腰重腳弱筋骨痛腿足寒厥或吐蛔或吐沫瘴病一作五臟之症俱見非若傷寒之傳經傳一經方見一經之症也知此則知傷寒汗吐下之法不當施於瘴瘧矣而治瘴之法當知升降浮沉則順之寒熱溫涼而逆之之理必使心肺之陽降於下焦俾下元溫暖下元者人身之根本也溫暖則根本固根本固則邪熱退諸病息矣冷瘴其症惡寒發震發熱頭或痛或不痛或嘔吐或不嘔吐胸膈痞悶身重腰痛腳軟或先寒後熱或先熱後寒寒時雖厚衣被不能溫熱時雖臥冷地不能涼或大渴飲水或一日一發發時多退時少或間日三日一發所兼之症極多不能盡述惟以其有寒謂之冷瘴有陰有陽故諺有云冷瘴必不死此瘴之輕者也其脈或寒時微遲熱時弦數或來六七至或陽症見陰脈治法先用感應丸十四粒薑湯送下次用陳皮半夏湯三四服或不換金正氣散三四服重者七八服方用和解湯三四服或七八服加厚桂更好得寒熱間斷多時後用截瘧丸酒送截之或養胃湯不已四獸飲此常法也如往來寒熱痰逆嘔吐頭痛及身腰痛如被杖汗多煩躁引飲自利小便赤或如中風者薑附湯主之如寒熱往來煩渴手足冷鼻尖涼身重舌黑渴欲飲水自利嘔逆汗出惡風者乾薑附子湯主之如上半身熱極下半身冷腿足寒厥者沉附湯主之或送養正丹黑錫丹靈砂丹如發熱手足厥冷煩渴悶亂上吐下瀉者附子理中湯主之如發熱咽嗌乾燥焦煩大渴飲水不止者冷湯主之或既濟湯理之渴甚者奪命散加附子主之如發熱腹痛頭目昏沉四肢疼痛大便自利小便或澀或利或嘔或咳者真武湯主之如發熱惡寒嘔不止者藿香正氣散主之夫瘴病多嘔病因飲食傷脾而得又炎方之病氣多上逆痰與氣並而上故多嘔如因食生冷太過嘔而惡食頭目昏沉肢體拘急痰多腹痛者養胃湯加附子沉香主之嘔甚送來復丹或治中湯主之如嘔吐膨脹者二陳湯送感應丸如嘔而胸膈不快脅筋脹滿心腹刺痛食少多痰吞酸噎氣及見症不一者以嘉主散主之如寒熱往來噁心嘔吐吞酸噫腐腹痛痰痞不能食紅丸子主之如大便祕者先服和解湯自然通利或祕甚者用嘉禾散加蜜主之又有多日不通者看病勢何如得大便利而後病方得愈方可用蜜導法若不甚急只以治瘴為主得熱瘴不來大便自然通利矣如寒熱臍腹刺痛脅痛煩亂引飲霍亂手足厥冷者冷香湯主之如寒多熱少或但寒不熱者其人平日虛弱七棗湯主之如神思昏亂狂言譫語不知人事者輕則養胃湯加附子沉香重者二陳湯加沉附若甚者沉附湯主之如脈代者此病甚不宜代脈看大便如何如大便照常養胃湯加附子主之如大便不利可與正氣散或和解散加桂大便行則代脈去矣如發熱頭痛小便不利煩躁飲水水入即吐者五苓散主之若引飲自汗小便赤澀者不得服五苓散汗出更利小便必亡陽也況滲泄之劑下虛者尤忌之如四肢厥冷頭額虛汗咳逆脈促其症甚危三建湯主之如症候不一多所變怪者和解湯主之如瘴止後腰痛腳軟者加減五積散主之如瘴止後汗多者黃耆建中湯主之如瘴止後食少體倦者異功散主之如瘴止後多痰及食入而心下飽悶者香砂六君湯或吞養脾丸如瘴止後虛煩不得眠心膽虛怯觸事易驚者溫膽湯主之熱瘴其病身發大熱神氣沉昏晝夜如臥炭火中腰痛腳弱大渴欲飲冷水上脘痞悶神昏妄語頭痛或不痛或嘔逆或不嘔逆小便赤澀或頻數或遺尿大便或祕或自利舌黑麵赤目紅或吐血衄血兼見之症不能盡述惟以其單熱不寒謂之熱瘴其熱多不間斷因陽氣盡發泄於外而然諺云熱瘴久不死此瘴之重者也治得其道得生者多其脈洪弦數或來七八至亦有見陰者治法先刺之南人治熱瘴初起不用藥只挑草子之法廣中之處有人能之凡有瘴發一二日卷其上下唇之裡以針刺其血正中用手捻去紫血又以楮業擦舌出血又令病人並足而立於兩足後腕橫縫中青脈刺之出血如注乃以青蒿水與服應手而愈若冷瘴與雜病決不可刺熱瘴之所以刺而得愈者即太陽傷寒症邪氣在表當汗之法也刺出其血即是得汗而其效速於得汗蓋人身之上下唇是陽明胃脈之所經足後腕是太陽膀胱脈之所經太陽受病三日而陽明受病南人之針可謂暗合若患熱瘴而不即刺及其三陽傳遍邪氣入里雖刺而血已凝非惟無益或至重傷又南人針法別有不可曉者發瘴過經已入里而將死刺病人陰莖而愈竊意其通五臟刺之或可去內腑之熱耳然少壯者尚可用此法苟施於怯弱者豈不危哉按黃帝內經九針從南方來刺熱論曰病未見赤色而刺之是謂治未病然則南方挑草子之法不可廢也但南人未知辨赤色之道愚謂熱瘴初起刺病人兩足腕出血又刺舌下出血頭痛兩額角脈脹者與兩額角脈上刺之出血其病勢果衰大半次服不換金正氣散又服和解湯七八服得間斷一日一發然後截之若間斷作二日一發尤妙不來之日服和解湯七八服和解後熱勢稍緩服養胃湯吞截瘧丸酒送日服六七次如未止服四獸飲此平常之法也如變症不一當與治冷瘴方法互治之如其症未解或疑有熱亦不宜服發汗及涼藥但取嘉禾散服之若果蘊熱但冷服無害蓋嘉禾散治下虛中滿能升降陰陽正與秋冬作熱之地為宜服二三日則寒熱之症自判矣然後隨症調治自無不效如嘔逆以養胃湯來復丹治中湯二陳湯選而用之如兀兀欲吐而不吐者二陳湯主之嘔而熱不退者藿香正氣散主之嘔而膨脹二陳湯下感應丸嘔而頭痛來復丹兼如聖飲子嘔而胸膈不快下虛中滿嘉禾散主之嘔而大便祕嘉禾散加蜜主之嘔而腹痛紅丸子及烏沉散嘔而痰逆頭痛身痛腳痛腳弱大汗多煩躁引飲大便自利小便赤澀者薑附湯主之吞養正丹或靈砂散如發熱煩躁手足冷鼻尖涼二症病人因熱大煩躁多不自知醫者須以手捫其手足與鼻尖方知之身重腳腰痛舌生黑苔大渴引飲自利嘔逆自汗惡風者乾薑附子湯主之如大熱咽嗌乾渴煩躁不解者冷香湯主之如熱大煩渴大作飲水無度者既濟湯主之甚者合奪命散如熱大神昏不知人事妄語遺尿吐血衄血舌黑麵紅目赤煩渴脈弦而七八至以手捫之額上極熱胸腹熱腰以下不熱而冷雖狂言妄語病人心蜷臥叉手捫心或引衣自蓋陰症具於隱微之中況脈只以五六至為數為實熱若七至八至是內陽盡出於外之脈腹內則空虛矣若誤用寒涼攻外熱其斃也可立而待急用沉附湯主之吞黑錫丹稍緩者二陳湯合沉附主之輕者養胃湯合沉附湯主之如熱大煩渴悶亂逆泄瀉手足稍微冷者附子理中湯主之如嘔逆泄瀉臍腹刺痛脅肋脹痛引飲無度胸膈不利者冷香湯主之如發熱腹痛頭目昏沉四肢疼痛大便自利小便或利或澀或嘔或咳自汗多者真武湯主之如因誤攻外熱以至四肢厥冷兩足如無頭顱虛汗不止或時發噦脈數而促其危尤甚急宜收心液壯真陽庶可更生宜服三建湯如大便祕其脈六至兼弦而有力者和解湯主之甚者用蜜導法如夏月冒暑伏熱即發熱瘴煩躁口渴上吐下泄心脾不調脈全不具陰症其脈弦而六七至有力六和湯主之如熱大便堅硬其人平素脾胃壯實而脈弦數有力者和解湯加蘇葉地骨皮主之如發熱頭疼或眼睛疼大便實其脈舉按皆弦數全無陰症其人平素宜涼劑者參蘇飲主之只可一二服稍和即止不可過用須要詳認不可誤人如已分為間日脾胃已和濕冷已去病退時脈亦弦數者養胃湯加柴胡主之如已服正氣和解溫中固下後熱已間斷截瘧丸不住者十四日外可少與柴平湯或柴胡散尤隱不可多服參蘇飲柴平湯柴胡散三方須細察病人平素宜涼劑胃氣壯實及脈實而無陰症具於隱微之中者方可用之如稍緩不若和解湯加減守之免致失手如已經七日發熱煩躁引飲喜冷水大便不通小便赤澀狂言內熱神昏不省者藥令黃耆湯主之若因上熱未降者尤宜沉附湯主之如無汗發熱頭痛小便澀煩渴飲水水入即吐五苓散主之不可多服如瘴止後猶狂言神昏者因心經之陽尚未降於下焦故也二陳湯加沉附主之或養胃湯亦加沉附如瘴止後腹痛腸鳴大便溏而頻平胃散主之如瘴止後虛煩不眠心膽虛怯觸事易驚或夢不祥或異象眩惑夜不安寢者溫膽湯主之無多服如瘴止後精神倦不喜飲食者異功散主之如瘴止後腰痛腳痛加減五積散如瘴止後自汗多者黃耆建中湯主之多痰體倦六君子湯如瘴止後易飢易飽者香砂六君湯吞以養脾丸啞瘴瘴病初起發熱頭痛或嘔逆或不嘔逆兼症雖多惟以其神昏不能言但噫噫作聲或全不作聲謂之啞瘴此熱瘴之甚者故諺云啞瘴無不死為不治之症也但不犯不可服之藥治得其道千百人亦可起一二人其脈初起一二日七八至而弦熱大至三四日熱微神清脈反和平如其症精神清目開如常能飲食能大小便熱微脈平常只是全不作聲者此真啞瘴極難救蓋肺氣入心則為聲音今瘴毒之熱沸其血湧於上塞於心肺之竅故不能言七日後多死治當散其血用麥冬湯調黑神散亦有得生如其症目上視口噤牙關緊閉昏不知人遺尿遺屎不能言以手重拿曲池虎口頰車人中亦知畏疼不能出聲叫哭待熱微時稍言一二句此痰迷心竅也為啞瘴用青州白丸子二陳合星附湯或三生飲元氣虛者加人參十可活三四如手足搐搦氣逆者附香散及養正丹如因食冷所致者蘇感丸如其症精神不甚昏能飲食大小便亦通熱不甚惟舌本強木不轉而不能言者亦非正啞瘴乃瘴毒中於心脾二經所致心之別脈系舌本脾之別脈連舌下邪氣入其經絡亦然用正舌散及全蠍麝香南星茯苓之類治之如其症初起或是寒瘴或是熱瘴能言語因醫者誤用發汗及升藥降藥而變啞者為不治之症雖神氣清爽脈息和平二三日決死不可用藥不治症一瘴病初起熱大不語至二三日熱微神清脈和惟不作聲此真啞瘴不治一瘴病上吐下泄精神昏亂脈微遲無力二三日決死勿治一瘴病因食生冷過多至四五日作泄手足冷者決死勿治一瘴病熱退時脈亦七八至無神者決死勿治一瘴病脈大而散無胃氣者不治一瘴病陽症見陰脈無胃氣不治有胃氣者生一瘴病誤服麻黃髮汗藥及柴胡黃芩苦寒藥而變啞者決死不治一因誤服麻黃而筋惕肉瞤者死一因誤服麻黃而目赤喘急者死一因誤服麻黃汗出不止發寒而噦者死一因誤服寒涼自利而手足厥冷漸及肘膝者死一因誤服寒涼而發噦者不治一因誤服寒涼狂起亂搏人者不治一因胎前染瘴胎落而變啞者不治一産後染瘴脈洪大如竹管鼓指七至者不治脈瘴病之脈不可不細察假如其脈沉細而遲此元氣虛寒之脈外症雖見純陽當急用沉附等藥苟誤投以寒劑其逝即在頃刻正所謂承氣入胃陰盛乃亡也在傷寒陽症見陰脈為必死之症瘴瘧為上熱下寒外熱內寒之病陽症見陽脈為真病脈見有胃氣者反為易治萬不失一如其脈弦帶數六七至有力而不散大此元氣不虛寒外症無陰症具於隱微之中只宜正氣散和解湯等藥苟誤投以薑附亦難收功正所謂桂枝下咽陽盛則斃或間有陰症見有陽脈亦不宜例用薑附且與和解正氣守之若苦寒之藥不可以脈見陽而妄用也如其脈洪大無倫七八至按之鼓指者或無力者此元陽氣盡泄於外之脈不可謂之陽脈蓋脈只以六七至為數為熱若七八至為元氣已飛越而邪氣獨盛正不勝邪故見是脈以浮而無力為洪若洪大通筋似指則為元氣不固於內反泄於外故見是脈正內經所謂脈大為虛是也鼓指者更虛於無力二脈兼見似內傷火不歸經之症方書謂龍雷之火其外症決見大熱之病細察之必有陰症具於隱微之中急宜用薑附等大熱之藥冷飲之其效可必倘誤投涼藥禍如反掌在他症脈至七八至為七極八脫決死之脈在瘴瘧如治以法者永保無虞如脈代而不散者當問大便如溲小便調為元氣不足宜參附之劑補之元氣實代脈去矣若數日未更衣更宜和解正氣使大便利黑屎去則代脈去矣若代而兼散則為不治之脈如脈瘴作時七八至溫中固下正氣和解後熱退去時一呼一吸只來二至在他症為二敗必死之脈在瘴瘧為邪氣盡退正氣將復之脈其外症決見渾身冰冷困倦乏力惟口中所出之氣略溫或大汗如雨惡寒之極斯時惟宜調養內服補脾之藥一日則前症俱退二三日脈復四五至矣日期瘴病無傳經治得其道則有減病常期治失其道則至其時日而增劇如瘴初起輕則自間斷正類瘧病治之當一日一發者十四日愈或二十一日愈二日一發者七日愈其故何也夫瘴多是元氣不勝邪一日一發元氣難復其愈遲二日一發元氣易復其愈速若三日一發則與痎瘧無異當以治瘴治痎之方斟酌合用必半年一年方可愈也其次初發不間斷正氣和解後三日即間斷七日可愈或十日愈又有重者直至七日方間斷十四日可愈如不愈二十一日才已有二十一日猶未已者雖未愈謹慎用藥再無變證若不知治瘴之法妄用藥餌不問輕重如重犯發汗涼藥則三日變證七日死有十日變症者有十四日變症者有二十一日變症者若犯石膏大黃則變症只在頃刻總之治失其道七日內變症極多十四日變症次之二十一日內變症又次之婦人南方陽浮陰閉陽恆泄陰恆固男子以陽為主故瘴病者多女子以陰為主故病瘴者十中一二治法與男子同更加以豁痰調氣降氣為主用四七湯烏沉散佐以沉香間服或加四物惟胎前産後與男子異在胎前以正氣和解方加大腹皮砂仁杜仲續斷安胎或兼四物若見陰症亦照薑附溫中鎮下方法胎亦不落即經所謂有故無殞是也或不幸而瘴毒深重熱極大胎多雖保胎下不變啞不作痙脈不洪大無倫鼓指數八七至者猶可治設變啞或脈七八至雖參附亦無如之何矣在産後染瘴者當大補氣血為主佐以溫中鎮下正氣和解不變啞脈不大七至八至多有得生者蓋脈大鼓指七八至瘴脈之常本可治惟産後不見此其大法不出於前三症中參論臨時斟酌可也小兒小兒瘴病多因乳母不與之避寒暑啖生冷飧炙煎致兒聚痰為患況小兒較之大人謂之啞科以其不能言病情故難辨別醫者當審諦聞其聲望其色察其舉止看其虎口參以三症治法斟酌其輕重而後藥之可也如熱大不寒振不作聲以手重拿合谷不作聲惟手撑動熱微時亦不作聲者此是啞瘴必不可治如熱大面赤舌黑目赤唇紅欲扯甌碗頻含乳唇紅是肺熱欲扯甌碗頻含乳是口大渴上吐下泄蜷臥或俯臥手足指梢冷是虛欲就實手足指冷中胃中冷睡露睛是脾虛時時狂叫或曲腰而啼是腹痛虎口脈通三關當用附子理中湯治之服至病減方止如熱大面赤舌黑目赤唇紅頻含乳不吐大便祕小便赤手足指梢不冷睡不露睛仰臥時時狂叫虎口脈通三關此無虛寒之症當用正氣和解參以熱瘧方法治之如先寒後熱先熱後寒或間一日發者或日一發者此是冷瘴治當以前審病之法用藥庶幾可稱為幼科之國手發瘴時調理卻病法衆人多發瘴時必須加意保養晨興盥漱後先服平胃散或不換金正氣散過一刻啖少粥巳時早食申時晚食夜間服理脾消食丸藥酒少飲不妨不宜太醉天氣若不常一日之間順其寒燠加減衣裳不食生冷則脾胃自壯省食油膩則胸膈自快無大忿怒以傷天和重節色欲以固真氣如此調攝決保無恙如秋冬大熱服以降氣鎮墜藥養正丹黑錫丹蘇子降氣湯祕傳降氣湯沉香降氣湯選而用之瘴病中將息法凡才病瘴時切須忌口非惟生冷油膩不可食尤忌酒肉魚面之類飯亦可住只可食粥仍戒葷食不得已吃白糝咸豉蘿蔔即當發時亦不可食候發過稍久卻食如不發日從便吃白粥不可太飽不忌口則病難已所食之物皆助邪氣致便服藥不效若食素粥數日依前法服藥即效所謂服藥不如忌口是也每日只宜漱口而已不可洗手面及梳頭但安心坐臥數日莫動如此將息無所不瘥瘴病後將息法凡瘴病才住可記初發幾日依前日數十分畏謹大率瘴不發後三日方可洗手七日後方可洗面半月後可略梳頭一二次三月內戒房事能戒百日尤妙瘴不發時仍素粥三日經五日後方以豬脾熟煮羹薄吃軟飯十日後略飲些酒少吃肉羹但不可食諸般骨汁若犯之即再發如牛羊雞肉復忌一月為妙如不能將息或至再發又須依前法服藥前法將息而已如飢飽勞役喜怒不時再發雖依前法服藥調理多致延綿半年方得平復終不若小心謹慎調理不再發為妙灸法凡冷瘴初起腰足寒厥其脈沉細因失飢寒傷飲食致病者內服薑附等藥外灸中脘從建里上行在臍上四寸中脘穴也氣海在臍下一寸五分宛宛中氣海穴也三里從下廉穴上行一寸鋭肉之端按之肉起手三里穴也三穴使中氣溫下元暖則病無不愈若無前症其人平日不甚虛弱及病始發者未可便灸如瘴病既久氣血已虛服藥不效者宜灸膏肓從魄之下行第四椎五椎上此穴居中去脊各三寸半正坐曲脊取之膏肓穴也或大椎一椎之上大椎穴也及第五椎五椎下神道穴也二穴隨年壯尤妙及足三里則久瘴自痊熱瘴忌灸瘴後變症瘴後調攝較之他病其難百倍善養生者於飲食起居之際兢兢業業無一毫差忒謹慎百日待脾胃元氣復常方可免變症之患若瘴後懈怠起居不時恣意飲食與夫沽酒市脯色氣無忌當此脾胃之元氣未復不能消化豈不積而作痢聚而作痰浮而作腫乎此難以立方施治蓋謂瘴後元氣常虛是無根本將何以當病耶今攝數方法於後以備審用當其臨時可權衡虛實而補瀉之痢下痢之因由元氣脾胃衰弱飲食不節積而不化遂致濕熱傷於氣分則白傷於血分則赤氣血俱傷則赤白相雜其青黃黑色者由濕熱兼傷各臟故見各經之色也脈沉小流連有胃氣者生洪大而數者死身涼脈靜者生身熱脈大者死治法初起腹痛裡急後重而痢者當審元氣何如元氣未虛者先服蘇感丸以下之去其積滯更兼有實熱者量用木香檳榔丸下之蓋謂無積不成痢故先宜蕩滌以去其積若兼伏暑以香茹飲送下小便不利五苓散送之次用消導和氣行血藥後服香連丸或變亂丸久不止斷下湯真人養臟飲斟酌選用若元氣虛弱者不可更行蕩滌先用六君子湯隨所傷物加藥送保和丸如傷米食加穀芽神麯穀食傷加麥芽神麯肉食傷加山楂神麯酒食傷加乾葛神麯兼嘔吐加砂仁藿香次用香連丸及四神丸如渴甚用七味白朮散送之如元氣下陷用補中益氣湯送下若兼脾胃虛寒用理中湯又有噤口者衛生方云噤口乃下痢不納飲食是也醫者但知危篤而乃畏縮不究其所致之由故多不救良可悲哉易簡方謂宜四柱湯理中湯茯苓散加肉蔻木香或咽震靈丹等藥何乃王德膚知其一未知其二耶蓋古方有清心蓮子飲及壓毒藥者有用生胃進食藥豈可執一物以治之耶如診視而知其脾胃脈不弱問知其心煩頭痛手足溫熱未嘗多服涼藥此乃毒氣上衝心肺所以嘔而不食宜用敗毒散每服四錢陳倉米百粒薑棗煎服又一方石蓮子捶碎去殼留心研為細末用陳倉米飲調下若其脈微弱或心腹虛膨或手足厥冷初病不嘔因服粟殼烏梅及諸苦澀涼劑或飲草藥過多早晨未食先嘔不思飲食此乃脾胃虛弱卻可信簡易方之言又有一方猶為簡易用山藥一味銼小豆大一半銀石器內炒熟一半生用同為末米飲調下甚有奇效又嘗觀前輩癰疽方治嘔逆不食者亦有一説毒氣攻心者以乳香緑豆粉作內托散服之脾氣虛弱者嘉禾散山藥丸治之胸中當存活法裁其方法為噤口痢用何患不收功於危篤耶大都瘴後痢疾極難施治如前數藥雖是良劑特準繩耳至於臨時變通在醫者盡望聞問切之功極精巧以別其虛實寒熱然後施治庶可為人之司命腫脹腫脹之因蓋為脾胃元氣虛損又不能調攝飲食起居失時復傷脾肺腎三經俱能作腫傷脾而腫者即經所謂諸濕腫滿皆屬脾土是也傷肺而腫者即經言飲食入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱令肺傷不能通調水道下輸膀胱使小便不利泛溢作腫是也傷腎而腫者腎屬水以腎氣虛寒不能攝氣以致泛溢反以浸潰乎上於是三焦停滯經絡壅塞滲於皮膚注於肌肉而為腫也脈浮大者生沉細者死臍突缺盆平手足心腫起無紋滿肚青筋腰腫陰腫無縫者俱不治治法傷於脾者宜實脾利水快氣嘉禾散烏沉散五加散實脾散五苓散五皮散平胃散胃苓散流氣飲斟酌詳用切不可用樟柳芫花黑牽大戟甘遂下水之劑傷於肺者補中益氣湯加減用之腎水虛寒者附子理中湯香砂六君湯加薑附煎送金匱腎氣丸以上諸方腫荃蹄變通之妙尤在醫者隨時取用痰瘴瘧之作多由痰滯而成故其痊後稍不調攝痰症即作然痰之變症非止一端為嗤為咳為嘔逆為麻木為痞膈及為異病之最重者又為卒暴痰厥眩暈等症若痰厥僵仆不知人事脈浮而遲者生數而急疾者死目開眼合手撒遺尿吐沫喉如鼾睡髮直搖頭汗綴如珠皆不治之症治法痰厥者三生飲合奪命散元氣不虛者吹鼻藥三生飲星附湯星香散及導痰湯選用其他痰症以二陳湯為主隨症施治不可執一也治濕要訣濕有內外之殊外感則入經絡而流關節內傷則由臟腑而歸脾腎濕為土氣土居水火之中水陰而火陽陰陽交感水火相蒸則生濕氣火盛則濕化為熱水盛則濕化為飲濕熱者治以辛涼濕寒者治以辛溫入腑臟者行其水道入經絡者開其汗孔辨藥升藥南方之地其氣不正陰常盛春夏多寒陽恆泄秋冬多熱陽外而陰內陽浮而陰閉故人得病多內寒外熱下寒上熱醫者不察概用升陽發表等藥致病者痰滯神昏而不知人服多者氣逆噦而汗出即逝蓋瘴病之作秋冬為多人之陽氣春升夏浮秋降冬藏秋冬熱是行夏浮之令而秋冬之令不行陽氣之不降也明矣陽氣不降則中下二焦空虛而寒大法升降浮沉則順之寒熱溫涼則逆之知此者急使陽氣下降及溫中之不暇而況敢用升浮涼藥以犯逆時之戒乎凡升陽之藥味辛性涼味辛便能散真氣性涼非脾胃虛寒所宜因其升故心肺之陽不降所以神愈昏不知人因其散氣故中氣愈虛不能運痰所以痰滯因其性涼脾胃愈寒所以發噦因其發汗故汗一出翻然作冷上焦幾微之間氣隨汗而出所以即逝議論至此治瘴者豈可以升陽風藥而妄用之哉所謂升陽風藥者如升麻防風荊芥羌活獨活前胡薄荷天麻蔓荊葛根細辛白芷川芎紫蘇之屬是也余觀今之醫瘴者不識其端妄以頭痛發熱身痛口渴為時行寒疫用敗毒散及升陽散火湯二三服則痰滯不語目瞪口噤元氣素實者熱退時此症亦退而蘇熱來時其症復來此時急宜溫中利痰用治瘴正法多有得生者若元氣虛服三四服即變啞瘴七日外竟成大夢又有一等元氣極實者服前藥亦不痰滯亦不變啞止是熱不退直至十四日內熱微時方作噦而逝此等變症不惟敗毒散火湯雖參蘇飲變症亦如此降藥經曰重陰必陽重陽必陰瘴病之作天氣熱而人身亦熱上多燥渴心胸煩熱是重陽也而鼻尖涼腰足冷痛是陰寓於其中也又寒極生熱熱極生寒故瘴之始作也必大熱及其病退也身無尺寸之膚下如冰冷醫者不知此理見其發熱煩躁舌黑麵紅目赤脈數便以為大熱之症用苦寒降藥如黃芩黃連梔子黃柏知母之屬愈投愈劇連服數劑則上熱未降中寒作或變啞或痰滯或發噦或手足梢冷厥而泄諸症一起百無一生又有甚者見其煩躁引飲而用白虎湯石膏湯見其舌黑大便祕小便赤而用大柴胡湯承氣湯此藥下咽或即發狂而斃或即痰滯而卒頃刻危亡是知瘴病未必遽能危人醫危之也苦寒降藥如天花粉木通滑石車前子元參連翹元明粉生地黃之類亦不可輕用醫者審之庶不誤人平胃或曰瘴病因於脾胃虛寒外感乖戾之氣而成而治法必先正氣和解所用正氣散養胃湯不換金和解散諸方俱有平胃散在內蓋平胃散古人用以治脾胃敦阜有削平之義故曰平胃非補脾胃藥何又用之況瘴病脈弦脈弦而服平胃散又犯東垣虛虛之戒何也豫曰發瘴之地其地多山其土卑薄方其晴明天氣熱蒸地下生水及其陰雨地下多濕人生其間常履於濕土之上經曰穀氣通於脾濕傷脾內故脾胃之虛多由陽氣浮於上陰濕之氣傷於下而然非若內傷之主於飲食勞倦也用平胃以去脾濕胡為不可中有蒼朮之燥濕不閉腠理使汗易出陳皮之消痰下氣川朴溫中下氣理痰消食甘草之調中氣益脾胃故李待制選以為治瘴要藥也若謂脈弦在內傷謂肝木克脾土宜補脾抑肝不宜去濕故犯虛虛之戒不知瘴病脈弦是瘧脈自弦之弦為邪在半表半裡因濕生痰而作故不禁平胃正欲其溫中去濕也麻黃衛生方云麻黃生於中牟有麻黃之地冬雪不積蓋麻黃能泄外陽故也今南方無霜雪皆如麻黃之地陽氣恆泄即此可知人居其間不勞麻黃而自汗有病則不宜輕發汗輕用麻黃此理甚明前輩詩云四時恆是夏一雨便成秋讀此一聯不惟知南方天氣亦可觸類而知夫人之病也假如病者多熱才經一汗便翻然為冷是豈宜輕發汗耶如五積散通關散金沸草散九寶飲小續命湯十神湯香蘇散俱有麻黃雖有主對亦不可服若麻黃湯青龍湯南方尤不可遽用也今人例以麻黃為發散藥殊不知其力只能驅我之內陽以劫外寒也古今方書用肺經咳嗽以肺之性惡寒肺為嬌臟易於感寒乃宜用之仲景治足太陽傷寒以太陽在表非汗不解及治少陰經傷寒發熱脈沉蓋少陰當無熱惡寒反發熱者邪在表也故以溫劑佐之發中有補皆所當用也除此三經方書已自少用況南方不寒之地瘴氣交重瘴病豈盡因感寒耶不因感寒不用麻黃又何不可南史記範云欲赴梁武帝九錫之命忽爾傷寒召醫徐文伯治之恐不得與慶事實告之曰欲即愈當先期取汗但不免妄泄元陽恐二年後不復起矣云曰朝聞夕可況二年乎文伯燒地布席置云於上得汗而解云大喜文伯曰不足喜也後二年果應夫發汗先期尚促壽限況不當汗而汗乎又嘗見有染瘴者上熱下寒腰足寒痛自謂五積散症也遂倍加麻黃多衣覆汗竟成重症雖服真武湯亦莫能救並贅於此為妄用藥者之戒大凡瘴病誤用麻黃服後啞者七日內死或筋惕肉瞤者十四日內死或目赤上氣喘促者十四日內死若汗出不止脈細如無悸動寒戰發噦者即時死余常目擊可不慎哉柴胡衛生方云夫人身本地水火風四大假合陰陽和會上焦屬火為陽下焦屬水為陰遇有寒熱見上熱下寒之疾不能升降既濟之而反用藥實實虛虛則水火解散而人身壞矣嘗謂見柳司教彭亮一曰染瘴身熱心煩自以為實熱乘渴以冷水吞黃連黃芩丸又取冷水以漬胸膈至日晡小便漸多更服黃芩湯小柴胡湯是夜連進數服小便愈數次日早熱漸才退而即逝可畏哉夫下元為人身根本根本既虛身乎何有小柴胡湯今人但知為可用退熱抑知其所以用乎夫仲景制方惟用之以治足少陽膽經傷寒蓋膽無出入道路柴胡乃本經藥邪在半表半裡非柴胡黃芩之苦能發傳經之熱則不可佐以半夏之辛以散除煩嘔復用人參甘草之甘以緩中和之氣又且存攻守之意也倘不擇其可而概用之鮮有不蹈彭司教之轍者大凡瘴病誤用柴胡湯後愈增煩渴舌愈黑身沉重自利頻頻手稍冷漸漸厥者二三日決死或發噦者七日內死或痰逆而啞者七日死俱所目擊者或曰若然柴胡斷不可用與余曰柴胡能治邪氣在半表非不可用也但必須其症一定不可已方可用之亦不可遽用其性極寒必須先溫中固下正氣後及十四日後其病退時脈亦弦數外症的系實熱方可用之亦當與正氣平胃養胃兼用可也或李待制柴胡散尤為穩當檳榔嶺表之俗多食檳榔蓋謂瘴瘧之作率由飲食過度氣痞痰結而檳榔最能下氣消食去痰故土人狃於近利而暗於遠害此謂北人之飲酥酪塞北地寒食酥酪膚理縝密一旦病疫當汗則寒塞而汗不得出南方地熱食檳榔不得檳榔味辛能下泄元氣大泄胸中至高之氣久食檳榔臟氣疏泄一旦病瘴元氣已自虛羸故不能堪所以南方多體瘠色黃夫豈全是氣候所致蓋亦檳榔為患殆不思耳附子衛生方云重陽必陰重陰必陽寒熱之變物極則反今瘴病或始寒戰而終大熱或連日極熱而後作寒正謂此也第傷寒以不飲水為內寒瘴則內寒者也亦飲水甚則欲坐水中取水以漬其心胸蓋炎方受病氣專炎上心肺焦熬華蓋乾涸所以多渴若其脈浮而虛按之無力又或病潮時脈洪數病不潮時脈微弱其症則心煩躁額上極熱面色多赤舌多黑頭或痛或不痛小便或頻或赤大便或泄腰腿沉重兩足不熱其有寒厥或疼誤服涼藥則渴轉甚燥轉急治此者當引上焦熱氣降於下焦正宜用大附子及灸丹田氣海足三里等穴使下元暖陰陽交泰而病自和解矣或曰口渴心煩面赤舌黑小便赤脈數明是熱症而子謂治此病者宜用大附子附子乃大熱藥也以之治大熱之病是以火濟火甚駭耳目吾子其有説以通之乎余曰方書有云凡間之火得木則炎得水則伏其疾之小者似之故立方有正治龍雷之火得木則燔得水則炎日出則滅其疾之大者似之故立方有從治復佐以熱因寒用之寒因熱用之之理今人染瘴或啞而不能言或熱而精神昏亂如臥炭火之中去死一間不謂之火病可乎所以立從治之方有薑附湯乾薑附子湯沉附湯附子冷湯附子理中湯真武湯冷香湯七棗湯極重三建湯雖各有主對俱系溫劑合冷服之或佐以涼藥乃寒因熱用也或曰以熱治之之法既聞命矣而三建湯用川烏附子天雄乃一物也何以別之余曰以春月採小者為川烏主除寒濕去痰冬月採大而有小子附於旁者為附子主回陽反本補下焦之陽虛大而旁無小子者為天雄取之雄不孕子之意其力全無分散補上焦之陽虛以三物同一本出於建平故名曰三建瘴虛因醫者誤用涼藥以致四肢厥冷頭額虛汗發噦脈數而促症甚急用之能收心液能止真陽多有得生者常山瘴與瘧似同而實異故瘴之輕者全類瘧疾醫者不知治瘴之法例用常山白砒及草果湧吐其痰致元氣實者荏苒難安元氣弱者即加腫脹多致不起深可太息蓋瘴疾因陽氣不降又吐之則不降之陽氣愈升中氣愈虛其不危者幾希故白砒草果毫不可用若常山猶有用處其力能去皮膚毛孔中之瘴氣寒熱所感邪氣多在榮衛及肉之間欲除根本非常山不可然常山多能吐人須制之使不吐方可用七寶飲冷服之不吐截瘧丸日服六七次酒送之亦不吐屢驗之藥也當知此藥乃末後之兵方其瘴之始發必先正氣和解溫中鎮下固守乎病人元元之氣兵法所謂避其來鋭是也及其熱之間斷也明見其作息有時一日一作只有五六時即退或間一日一作審知其脾胃已和下焦濕冷已去元氣漸而平復邪熱漸微漸短即用七寶飲截瘧丸則應手而愈兵法所謂擊其惰歸者是也苟不明此理當其病熱正盛而用常山則非徒無益而正氣愈損矣黃耆白朮肉桂瘴疾之作率由暑熱所以腠理不密多自汗醫者因其自汗以治瘧之法治之用參耆歸術之劑補之服後愈覺煩悶難安神識昏迷不知天熱氣蒸得雨方解瘴病熱蒸煩汗方除白朮止汗黃耆止汗密腠理汗不得出熱蒸無由得解更作煩悶神昏故白朮黃耆亦不宜遽用或曰白朮黃耆其性斂汗為不可用而肉桂亦非汗藥何又用之余曰肉桂固能止汗本草有曰主溫中又曰本乎地者親下補腎用肉桂故其性亦能引上焦之陽氣下達腎經故可用或曰子言天氣熱蒸得雨方解瘴病熱蒸得汗方除今病者自汗宜其瘴之愈也何又不除余曰此自汗略得舒片時之熱悶耳若欲其愈必也溫中固下正氣和解使陰升陽降榮衛和調邪無容地自然大汗如雨自頭至足無處不出大汗後渾身冰冷惟口中所出之氣略溫此等證候不見瘴熱不復來矣此時惟當慎其調攝得百日元氣可復常耳酒本草載三人晨同行觸霧空腹者死食粥者病惟飲酒者獨不病南方天氣清晨多霧而寒故人相勉以飲酒謂其可以禦寒闢瘴殆不知乃發瘴之源也蓋南方暑濕飲酒則多中暑濕毒兼瘴瘧之作率由上膈痰飲而酒尤能聚痰嶺外諺云莫飲卯時酒莫飽申時飯此誠攝生之要也然忌夕食者人雖易曉戒卯時酒者人以為疑蓋南方氣候不常雖盛夏陰雨必寒雖隆冬日出必暖一日之間寒燠屢變要之晝多燠夜多寒飲酒過度固非所宜而卯酒尤甚方其朝寒而飲遇暴熱則必聚痰以為病也
