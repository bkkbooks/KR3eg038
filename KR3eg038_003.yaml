body:
  text: 卷下正氣方陳皮半夏湯治瘴瘧不問先寒後熱先熱後寒多熱小寒多寒小熱皆因夏月傷暑汗出不透或秋傷風或過食生冷先傷脾胃沐浴感冒多作此疾因為痰涎停於胸膈所謂無痰不生瘧初起宜先下感應丸溫中去積滯方服此以正氣去痰陳皮去白半夏湯泡七次各等分為粗散每服四錢姜七片水煎不拘時服壯實人日三四服虛弱人日二服瘴瘧本於痰痰生於濕半夏能勝脾胃之濕所以化痰與陳皮同用其味辛辛能散滯氣利水穀下氣氣行則痰行所以治瘴先用之以正氣理痰也不換金正氣散治四時感冒五腫膈氣和脾胃溫中下痰止霍亂吐瀉心腹疼痛脹滿吞酸噫痞噎塞乾嘔噁心中受寒濕生冷外感風邪及山瘴之氣發而為瘴身體沉重骨節痠疼頭昏鼻塞未分陰陽之間正宜服之則氣自正而病自退及能止汗治諸瘧疾遍身浮腫或風氣所灌手足腫痛全不思飲食腸腑時鳴婦人胎前産後皆可服之小兒脾胃不和時氣諸疾又治四方不服水土凡寓嶺南此藥不可缺也厚朴去皮生薑汁浸一夜半夏湯泡七次薑汁浸曬乾陳皮去白藿香去梗洗淨甘草草果去皮蒼朮去皮米泔水浸一宿妙上各等分先用鍋炒厚朴令香次入蒼朮炒令紫色又會半夏炒香熟再入甘草炒黃又入陳皮炒方將衆藥安藿香在中心用藥遍蓋罨定少時許藿香乾方可取出同草果為散每服薑棗水煎一方無草果按發瘴之地地土卑薄陰濕之氣恆盛四時多熱陽燠之氣恆泄濕氣盛則脾胃傷陽氣泄則脾胃冷是方用厚朴之溫中去濕滿陳皮之消痰下氣蒼朮之燥濕健胃安脾甘草之調中同用以去敦阜之氣半夏之利痰以除瘴本藿香之芬芳助脾開胃止嘔草果之辛以消食化滯共為溫中正氣之劑方名正氣者謂其能正不正之氣故治瘴為先用之劑藿香正氣散治證同前嘔吐不止者用此藿香葉曬乾陳皮去白半夏湯泡薑汁浸炒甘草厚朴去皮薑汁炒上各等分薑棗水煎此即前方去蒼朮草果治瘴之嘔甚者聞藥氣則嘔蒼朮草果其氣太辛竄故去之大無神朮散治證同前若兼耳閉心痛者用此蒼朮厚朴陳皮藿香甘草石菖蒲姜水煎服此方即不換金去半夏加石蒲此太無治瘴之方若瘴初起兼耳閉心氣痛者可擇用之以菖蒲味辛能散邪開竅治冷氣也二陳湯治瘴病術術欲吐不吐及嘔而膨脹又治證候未分用此服之待其明白見證方用對證藥陳皮五兩半夏五兩湯泡七次茯苓一兩去皮甘草一兩上銼散每服五錢姜七片烏梅一個水煎溫服不拘時候諺云無痰不成瘧故瘴病當以治痰為主痰生於濕由脾土不能制濕而成是方用半夏辛溫能燥濕茯苓甘淡能滲濕濕去則痰不生陳皮辛溫能和氣甘草甘平能益脾則土足以制濕和氣則痰不能留滯名曰二陳者以半夏陳皮二藥宜陳用之為君故名之此方治瘴首尾俱可用溫中固下之藥恐其太峻加入此方含用則少緩養胃湯治外感風寒內傷生冷增寒壯熱頭目昏痛肢體拘急乃闢山嵐瘴氣脾寒痰瘧四時疫病治冷瘴及寒痰加附子人參伏苓甘草半夏蒼朮厚朴藿香草果陳皮上各等分每服三錢烏梅一個姜七片煎熱服不拘時是方乃不換金合二陳加人參烏梅瘴初起於濕痰之內積邪氣之外感而成故平胃以除濕二陳以去痰正氣以正不正之氣人參之甘溫補脾益元氣而利痰烏梅之酸以止渴收肺氣可為治瘴良方豫每用溫中固下之藥參合此方甚獲奇效和解方和解散治瘴瘧正氣之後專用此方一日五六服南人常自汗不可汗不可下不可吐多是脾胃感冷成病此方和脾胃逐風邪其妙如神感病輕者更不再發重者亦自減輕蒼朮半斤制陳皮二兩去白藁本四兩洗桔梗四兩甘草四兩厚朴二兩去皮姜浸炒上共為粗散每服三錢水一鍾生薑三片棗一枚同煎至七分去渣熱服一日夜五六服不拘時若用此藥不發更服此藥一日方服別藥發稍輕亦有奇效後再發次日更服一日亦五六服若第三次不發更服此藥一日卻服別藥如三次再發卻服後藥此藥不止治瘴神效就是傷風傷寒作瘧證候未分之時並服此藥一二日皆有效驗如不效即自依各症用藥若無於藥之地病初發至末後皆服有效瘴病起於地濕濕則生痰天氣熱外泄脾胃多寒是方用蒼朮為君能去濕不閉腠理使汗易出汗出則病從汗減與厚朴甘草陳皮同為平胃之劑能去濕溫脾胃去冷氣調中氣濕去則痰不生脾胃溫冷氣去則土暖中氣既調且和暖則瘴毒不能留自然作汗而解加以藁本乃太陽經藥頭痛身熱腰脊強痛乃邪氣鬱結於太陽經藁本能使其邪自然作汗而又治風流於四肢凡中霧露之氣皆能為瘴藁本能祛其氣而清上焦更去風除濕桔梗之利肺氣利痰發散胸膈瘴熱之氣與平胃合為和解之劑為治瘴和解之神方溫中方附子理中湯治瘴毒發熱煩渴悶亂外熱內寒自利嘔逆手足厥冷大附子炮去皮臍人參去蘆炙甘草炮乾薑白朮去蘆土炒上各等分水煎溫服如欲飲冷則冷服瘴病發熱煩渴是心肺之陽不降而然自利嘔逆手足冷是脾土無陽虛寒而然是方也寒淫於內治以辛熱乾薑附子之辛熱以治內寒吐利則脾虛脾虛者以參朮甘草之甘補大附子能引上焦之陽入於中焦則煩熱退中焦曖則吐利除治中湯治瘴疾嘔吐心腹滿痛人參白朮乾薑甘草陳皮青皮上各等分水煎熱服不拘時瘴疾多嘔者因脾土虛寒痰氣上逆而然也故以乾薑之辛熱治寒人參白朮甘草之甘溫以補脾同為理中之劑而陳皮青皮之辛以散氣氣降則痰下而嘔止矣真武湯治療病數日後發熱腹痛頭目昏沉四肢疼痛大便自利小便或利或澀或嘔或咳大附子炮白茯苓去皮白朮炒白芍炒黃色上藥姜五片水煎食前溫服小便利者去茯苓大便利者去白芍加乾薑嘔者加生薑五片易簡方云不下利而嘔者去附子加生薑然既去附子但存三味似太平易更當臨時消息之治病之法本當遙度也活人書云太陽病發其汗出不解仍發熱心悸頭眩身瞤筋惕振振欲劈地真武湯主之意謂太陽經傷風醫者借用麻黃既然不解覆成重虛故宜朮附芍藥之類又云少陰病二三日不已至四五日腹痛小便不利四肢沉重痛疼自利或嘔或咳或小便利此為有水氣真武湯主之今並贅於此以資用藥者見聞庶不局於一偏也瘴病頭目昏沉四肢沉重疼痛者寒濕傷脾之外證也腹痛自利小便不利者寒濕傷脾之內證也脾惡濕濕勝則濡泄故用茯苓白朮之甘以補脾去濕寒淫所勝治以辛熱附子生薑以補脾益陽氣而去寒白芍收脾氣除腹痛又能停諸濕而益津液使小便自行然必須酒炒黃色以去寒性名真武者真武乃北方之神能鎮北方寒水氣使不為禍也嘉禾散又名穀神散治中滿下虛五噎五膈脾胃不和胸膈痞悶脅筋脹滿心腹刺痛不進飲食或多痰或吞酸胸滿短氣肢體倦怠面色萎黃如中焦虛痞不任攻擊臟腑虛寒不受峻補或因病中氣衰食不復常稟受祛弱不能多食及瘴疾陰陽表裡未分之際尤宜服之枇杷葉去毛薑汁炙一兩石斛酒拌微炒三錢杜仲酒薑汁同炒三錢青皮五錢甘草一兩五錢藿香葉三錢穀芽炒五錢陳皮去白三錢白朮炒二兩砂仁二兩薏米仁炒一兩隨風子一錢如無小訶子代之半夏薑汁製三錢丁香五錢不見火木香三錢桑白皮炒五錢檳榔炒五錢五味子炒五錢神麯炒一兩人參去蘆一兩白蔻去皮炒五錢茯苓一兩去皮大腹皮炒三錢沉香三錢上為末每服姜三片棗二枚水煎溫服不拘時此方療四時感冒能調陰陽使無變動刻日得安如療五噎加乾柿蒂一枚同煎如療膈氣吐逆羸困入蔥白三寸棗五枚同煎婦人亦可服瘴病發熱候冷服老人虛人大便閉加蜜少許煎冷服瘴病多因脾胃感冷而成是方用參朮苓草陳半六君以補脾利痰丁香木香砂仁白蔻藿香以開胃除積冷以溫中青皮以理氣穀芽神麯以消積瘴病上熱肺最受邪枇杷葉薏米仁桑白皮以養肺散肺熱五味隨風子之酸以補肺斂肺氣瘴病陽氣不降檳榔大腹皮沉香以降氣氣不降則下寒下寒則腎無陽石斛杜仲合沉香引陽氣入腎而暖腰膝故李待制謂其宜於瘴病能升降陰陽雖證候未分亦可服之平胃散治脾胃不和膈噎痰氣嘔吐酸水氣刺氣悶脅筋虛脹腹痛腸鳴胸膈痞滯飲食不美常服則溫養脾元及闢嵐瘴冷濕病後進食悉有神效厚朴三兩去皮薑汁炒陳皮留白三兩甘草二兩炙蒼朮五兩米泔水浸炒生薑四兩和皮薄切小棗二百粒去核上用水五升漫火煎乾搗作餅子先曬後焙碾為末入鹽少許調服如泄瀉加生薑烏梅空心服脾寒瘧疾可加草果烏梅各一個如胃寒嘔吐加丁香茯苓生薑氣不舒快不美飲食加砂仁香附各三兩生薑湯調服瘴地陰濕之氣常盛脾惡濕蒼朮以扶脾燥濕厚朴以溫中下氣理痰消食去濕陳皮以消痰利氣甘草能健脾和中姜以利痰溫胃小棗之甘可以補脾氣紅丸子治食瘧噁心腹滿寒熱右手寸關脈弦實或沉滑要之瘴瘧多因食積氣痞痰結此藥消食下氣化痰寓廣者正宜服之但礬紅阿魏難得好者又阿魏雖為下氣消瘴之妙藥卻不可常服而又不宜於孕婦虛老之人所以易簡方云礬紅阿魏不宜常服用以治瘧黃丹為衣最好若食積癥瘕痞脹得真阿魏卻甚良然亦在修合之際用好米醋煎陳米糊為丸自洗米至作糊不著水純用醋為妙蓬莪朮五兩煨青皮五兩去穰陳皮五兩去白京三稜五兩煨胡椒三兩乾薑三兩阿魏二兩酒化礬紅為衣用上為細末醋糊為丸礬紅為衣每服六十丸不拘時治瘴疾生薑桔皮湯下大病後飲食難化及中脘停酸薑湯下心腹脹滿紫蘇湯下酒疸食疸遍心皆黃大麥煎湯下酒傷面黃腹脹或時乾嘔煨薑湯下脾氣刺痛菖蒲湯下兩脅引乳作痛沉香湯下瘴瘧外因四時之氣乖戾內因積食生冷而成留者攻之故用阿魏稜術以去積冷積為患氣快則消氣滯則聚得熱則行得寒愈結青陳皮之辛溫以快氣椒姜之辛熱以散冷結用礬紅為衣者假其土性以培脾胃耳治瘴用之以溫中消積甚得其宜感應丸治瘧初起先服以去冷積及治飲食生冷硬物停積不化心下堅滿胸膈痞悶兩脅脹痛心腹大痛霍亂吐瀉大便頻後重遲澀下痢赤白膿血相兼米穀不消愈而復發嘔吐痰逆噁心喜睡大便或祕或泄不拘新久積冷並皆治之南木香一兩五錢去蘆丁香一兩五錢乾薑一兩炮肉豆蔻去皮捶碎去油二十粒百草霜二兩研細末巴豆去心去油淨七十粒杏仁去皮去尖四十粒研爛如膏上將前四味為末同草霜杏仁研勻又將好黃臘六溶化作汁以重棉濾去渣更以好酒一升於銀石器內煮臘數滾傾出候酒冷其臘自浮取臘聽用春夏修合用清油一兩五錢先於銚內熬令不散香熟次下煮過臘四兩化作汁就銚內拌和前藥末作錠以油單紙裹之旋丸每服十丸緑豆大薑湯送下或用陳皮半夏湯送下亦可溫中固下方姜附湯治瘴病內弱發熱或寒熱往來痰逆嘔吐頭痛身疼或汗多煩躁引飲或自利小便赤兼主卒中風黑附子大者要一兩以上者一個炮去皮臍分作四服每服加姜十片煎溫服如欲冷者候冷服之不拘時瘴病痰逆嘔吐自利者脾土無陽虛寒也汗多者陽氣外泄也煩躁引飲小便赤者陽氣上浮心肺焦熬而然也頭痛心疼者虛寒外甚也是方用附子之辛熱以溫脾收外泄之陽氣佐以生薑又能發散外寒候冷服之則能導心肺之熱下行除下焦宿冷以熱攻熱為治重瘴之良方大意先見附子論乾薑附子湯治瘴毒陰虛發熱煩躁手足冷鼻尖涼身體重舌苔黑引飲煩渴自利嘔逆汗出惡風大附子一個去皮臍分作四服乾薑二錢炮上水煎欲飲水者冷服之瘴病煩渴引飲舌黑陽氣上浮心肺極熱也手足冷鼻尖涼吐利脾土無陽虛寒也身體重寒氣外盛也汗出惡風陽氣外泄不能衛皮毛也姜附之辛熱能溫中祛外寒而收外泄之陽氣冷飲之以導心肺之熱下行而暖下焦上焦之熱下行中下二焦溫暖則寒熱退諸病息矣沉附湯治瘴病上熱下寒腿足寒厥大附子五錢沉香磨濃汁上姜七片煎八分乘熱入沉香汁勿令十分熱放冷服之此藥既主上熱下寒須真正沉香方佳雖弄沉亦不濟事況此香自有數種既用服餌當以滋味別之如咀嚼而香甜者性平辛辣者性熱用者須審擇以對證附子率用小者及漏蘆側子之類謂難得大者然陰毒及冷瘴但欲一時壯陽氣可也若虛而藉降氣斂陽倘非地道大附子非徒藥之無益夫亦處方者之罪也瘴病本上熱下寒加之腿足寒厥乃下焦腎經陽氣盡浮於上腎經空虛之極是方用附子乃腎經本藥加以沉香能引上焦陽氣上腎腎中有陽氣則下元暖根本固而邪氣自息矣冷湯治瘴病內寒外熱咽噎乾燥煩渴不止人參五錢甘草三寸炙淡竹葉十四片大棗五枚大附子一錢去皮上水煎服瘴病內真寒外假熱咽噎乾燥煩渴不止者心肺熱也人參之甘能補脾氣生津液利痰甘草之甘能和平二味合用能緩心肺之火淡竹葉能解煩渴大棗能補元氣大附子能引心肺之火下行則煩渴止矣既濟湯治瘴病熱大煩渴飲水無度大附子三錢人參三錢甘草一錢淡竹葉二十片半夏一錢粳米二錢麥門冬二錢去心上水煎服瘴病煩渴飲水無度者華蓋焦熬之極也故用人參以補肺生津甘草之甘以緩火麥冬竹葉之寒以潤肺清肺佐以半夏不令痰滯粳米乃肺經之谷用以養肺若附子之用妙在於引火下行不令華蓋焦熬也冷香湯治瘴病胃脘刺痛胸膈不利或吐或瀉引飲無度及治夏秋暑濕恣食生冷遂成霍亂陰陽相干臍腹刺痛脅肋脹滿煩亂口渴等證良薑一兩檀香二兩丁香五錢附子一兩甘草二兩川羌一兩草豆蔻一兩上為細末每用三錢水一鍾半煎數滾貯瓶內沉井底待冷服之瘴因食生冷而得胃脘痛吐瀉胸膈不利皆脾胃之寒也寒淫於內以辛熱川羌良薑檀香草蔻丁香附子皆辛熱之藥去寒溫胃甘草之甘溫以和中大渴引飲者心肺中有邪熱故冷飲以導邪熱下行也三建湯治瘴病四肢厥冷頭汗出不止兩足如無或時發噦川烏大附子天雄上各等分水煎服瘴病四肢厥冷兩足如無者脾胃虛寒之極中下二焦全無陽氣也頭汗大出不止者陽氣盡出於上欲絶也噦俗呼為厄逆方書謂絃絶者聲嘶不凍者葉落陽氣將脫也此等證候皆因醫者誤用攻熱之藥以致此危急也是方用川烏以去寒濕攻寒痰附子補下焦之虛陽天雄補上焦之虛陽合用之以收心液壯真陽汗收噦止四肢溫暖則可復生矣按此溫中固下二法治瘴之重者必用之第瘴病顯然明見者皆極熱之證而陰寒之證隱然難見故以熱治熱之法非玄機之士未免皆以為怪也然必冷飲者乃內經寒因熱用熱因寒用之義已見附子論鎮下方養正丹治瘴病上盛下虛升降陰陽補接真氣及治虛風頭眩吐涎不已黑錫水銀硫黃硃砂各一兩炒另研上先將淨鐵銚入鉛先熔去滓一兩淨再入銚內用鐵匙炒攪將硫黃末一錢漸投入或焰起無妨只急手攪炒令鉛熟無性其硫黃皆燒去但得鉛熟遂領地下紙上令硬即研細以紗篩出鉛粉其餘成朱者再炒再研再篩次將銚頓漫火上又熔鉛粉入硫黃一兩頻頻攪炒至黃煙上即急持起放冷處少頃又頓火上再炒鉛與硫黃皆成黑色極調和了卻放冷處候其微冷又頓在微火上少頃入水銀以匙攪炒切勿令青煙上又次入硃砂末頻炒至十分調和即頃在地中紙上系硬別研為末黏米糊為丸緑豆大每服二十丸鹽湯送下瘴病之證多上熱下寒是方用硫黃大熱之藥能補真陽壯真火佐以硃砂黑鉛水銀三味皆至陰之物其性寒所以去巨格之寒兼有伏陽不得不爾硫黃亦號將軍功能破邪歸正返滯還清挺出陽精消陰回陽化魄生魂故治瘴用之能引上焦陽氣降於下焦使陰升陽降成水火之既濟鎮墜其陽氣使不上浮外泄元常溫暖已病瘴者得愈未病者可以免矣黑錫丹治瘴病上熱下寒升降陰陽及治痰氣壅塞上盛下虛心火炎熾腎水枯竭及婦人血海久冷無子赤白帶下屬虛寒者並治之黑錫二兩硫黃二兩肉桂五錢沉香附子炮去皮臍故紙炒小茴炒木香胡蘆巴酒浸炒肉蔻麵煨陽起石研細水飛金鈴子蒸去皮核各二兩上用新鐵銚如常法結黑硫砂於地上出火毒候冷研極細末余藥並末同研自朝至暮以黑光為度酒麵糊丸梧桐子大陰乾入布袋內擦令光瑩每服三五十丸鹽湯下或棗湯婦人艾葉湯下瘴病上熱下寒是方硫黃之大熱能助真火佐以黑鉛之至陰能治陰盛格陽之病木香能理諸氣肉蔻能下諸氣沉香能降諸氣加以故紙小茴胡蘆巴引陽氣入腎肉桂能保腎附子導熱氣下行入腎若陽起石能補腎添精直高巔之上引陽氣下達腎經共為溫補下元鎮固陽氣與瘴病為宜也來復丹治瘴病上盛下虛升降陰陽及治伏暑泄瀉如水嘔吐不止硝石三兩青皮二兩去穰五靈脂二兩去砂石陳皮二兩去白玄精石二兩研飛硫黃二兩為末同靈脂入鍋內微火炒用柳條攪不可火大再研極細末上末醋糊為丸豆大每服二十丸米飲下瘴病內傷生冷外感暑氣氣不升降是方硝石性寒佐以青陳皮性疏快硫黃大熱能助真陽佐以硝石玄精石之至陰則伏陽格陰皆退五靈脂能理氣共為通利三焦升降陰陽之劑瘴疾揮霍變亂者尤宜用之靈砂丹治瘴病上盛下虛痰涎壅塞此藥最能升降陰陽鎮墜陽氣安和五臟扶助元氣水銀八兩硫黃二兩上用新鐵銚炒成砂有煙即以醋酒候研細入水火鼎內醋調赤石脂封口鐵線扎縛燈盞鹽土固濟曬乾用炭二十斤煅煉如鼎裂筆蘸赤石脂頻抹火盡為度經宿取出研為細末糯米糊為丸麻子大每服二十丸棗湯下米飲人參任下瘴病多因秋冬熱則陽氣外泄浮而不降下元虛冷是方用硫黃大熱能補下元真火佐以水銀至陰之物復加煅煉成水火既濟之義能祛拒格之寒兼有伏陽大能降上焦之元氣於下元鎮墜之使不外泄甚與瘴病為宜斷瘴方七棗湯治外感風寒內傷生冷或五臟氣虛陰陽相勝作為瘴瘧寒多熱少或但寒不熱大附子一個炭火煨以鹽浸再煨再浸七次去皮臍切片上用生薑七片棗七枚水煎當發早晨空心溫服仍吃棗三五枚忌口為要冷瘴因寒疾而作是方用大附子去寒痰且能引上焦之陽氣下入至陰以成天地之交泰正王太僕所謂益火之元以消陰翳加以大棗之甘以溫補脾氣則寒痰息而瘴瘧止矣四獸飲治喜怒不節飲食過度勞役兼併致陰陽相勝結聚痰飲與衛氣相搏發為瘴瘧人參半夏湯泡七次茯苓去皮白朮草果去皮陳皮甘草炙減半烏梅去核上銼散用生薑棗子入鹽少許醃之食頃厚皮紙裹水蘸溫慢火煨香熟焙乾每服半兩清水煎未發前連進三服瘴瘧雖因天時若平人脾胃元氣實則瘴毒雖慘於身乎何有惟喜怒傷氣飲食傷脾則元氣不固然後瘴毒得以干之經所謂邪之所腠其氣必虛是也是方用參朮苓草之甘溫補脾以益元氣加陳皮之辛以理氣半夏之辛以燥濕利痰草果之辛以消食烏梅之酸以斂氣生津薑棗以補元氣共為截瘧之方亦君子滿座小人自退之意也截瘴丸治瘴病不問冷熱或一日一發二日一發三日一發常山五兩醋炒七次烏梅四十粒去核檳榔四十粒甘草三兩上再同炒為細末薑汁打米糊為丸梧子大未發時好酒吞二十一丸一日服七八次尤妙發時莫服瘴止後忌雞魚羊肉及鮓面蔥韭並生冷瓜果一切毒物避風寒成房事毋忿怒瘴與瘧同病而異名第瘧有定規瘴多變怪治瘴之法不間斷者使之間斷明見作息有時已間斷者使之輕減然後用是方無痰不瘧故用常山以去痰寒熱所感邪氣多在榮衛肌肉之間常山能去皮膚毛孔中之邪氣佐以檳榔能下滯氣消積利痰甘草之甘以和中氣借烏梅之酸以斂外泄陽氣生薑之辛以開胃利痰痰去則瘴本去矣截瘴之方惟此為妙七寶飲治瘴瘧一日一發或間日一發明白作息有時此以截之常山檳榔青皮草果去皮厚朴甘草上各等分用酒水各一鍾煎好以棉罩之放星月下露一宿當日早冷服服後莫熱飲食無痰不成瘧是方用常山以逐痰檳榔以墜痰氣草果以溫中去寒痰厚朴青陳皮之辛以行氣氣行則痰不能留甘草以調胃和中共為行氣消痰之劑痰消則瘧本消宜乎瘴之不再作也按瘴病治法最難於始發熱不間斷時及其溫中固下正氣和解後明白作息有時正氣漸和下焦濕冷已去諸凡截藥不犯寒涼不吐不利者俱可用麥門冬湯治啞瘴神清目開大小便如常惟全不能出聲身熱麥冬去心人參白朮陳皮川芎半夏當歸肉桂烏梅大附子甘草茯苓去皮上加姜三片水煎溫調黑神散服啞瘴若神昏直視不知人事痰響者屬痰神昏不知人事不痰響能飲食惟不能出聲此邪熱湧沸其血上塞心肺之竅故不能言也是方用六君子緩火邪以補脾救元氣門冬解心肺之熱烏梅生津以收外泄陽氣歸芎以行散上竅之血血得熱則行故用桂附之熱以行之且能引上焦之陽下入陰分再調黑神散以驅逐其血血散則心肺之竅開而聲音出矣黑神散治啞瘴黑豆二合半炒去皮當歸二兩蒲黃二兩乾薑二兩熟地二兩肉桂二兩去粗皮白芍酒炒五錢甘草五錢上為末每服二錢調麥門冬湯下瘴病之熱專熬心肺熱甚則湧沸其血出於上竅則為吐衄不能上出口鼻惟塞於心肺之竅則為啞瘴是方蒲黃能逐敗血芍歸能去舊血生新血姜能使血行甘草以和氣益血乃陰類熟地黑豆乃北方之物合諸藥以導血歸源也青州白丸子治啞瘴目上視口噤痰涎閉塞昏不知人遺尿遺屎及治中風痰甚等證生半夏七兩南星二兩生白附子二兩生川烏五錢上為細末以生絹袋盛於井花水內擺出未出者再以手揉令出渣再研再入絹袋擺盡為度於瓷盆中日曬夜露每日一換新水攪澄清春五夏三秋七冬十日去水曬乾研細以糯米粉煎粥清為丸緑豆大每服二十丸生薑湯下啞瘴口噤目上視痰涎閉塞昏不知人遺尿遺屎因脾胃感冷中氣不能運痰以致痰氣上迷心竅故神昏不能言也痰生於濕半夏南星能燥濕痰滯於寒白附之溫川烏之辛熱能祛寒送以薑湯最能治痰滯之瘴也星附湯治啞瘴痰涎上壅昏不知人聲如牽鋸口噤直視遺尿遺屎生南星一兩生附子一兩木香五錢上銼散每服四錢姜九片水煎溫服啞瘴有痰涎上塞聲如扯鋸之狀則再兼異證皆痰所為由脾胃感冷中氣虛寒不能運痰而然故用南星之燥以去痰附子之辛熱以溫中佐以木香之辛以行氣氣行則痰行也豫治痰證多以氣方為主重者單用或加二陳湯內虛者再倍加人參更佐以沉香屢屢獲效三生飲治啞瘴如前證之甚者及治瘴後痰厥生南星一兩生附子五錢生川烏五錢木香二錢五分上銼散每服五錢生薑十片水煎溫服元氣虛者加人參五錢同煎是方即前方加川烏因脾胃虛寒之甚故加之若元氣虛者加人參補元氣利痰有起死回生之妙正舌散治瘴病舌本強硬語言不出蠍梢二錢五分去毒茯神一兩微炒去皮木薄荷一兩焙乾上為末每服二錢溫酒調下或擦牙頰間亦妙瘴病舌本強硬語言不出者因瘴熱入於心脾經絡而然蓋心之別脈系舌本脾之脈連舌本散舌下是方用茯神可以寧心益脾薄荷能去風熱蠍梢能去風痰風熱去則心脾清而舌強自消矣柴胡散治瘴病十四日外寒熱不已不潮時脈弦數者柴胡一兩去蘆半夏五錢湯泡桂心五錢去皮白芍五錢炒炙甘草三錢上銼散姜七片棗一枚水煎溫服寒熱得退便止此藥瘴病十四日外已過經矣病雖未愈元氣稍蘇更兼其脈熱不潮時亦弦數此正瘧脈弦數多熱之證況寒熱脈弦是邪在半表半裡足少陽實主之故用柴胡為君本經藥也木得桂而枯故用以散少陽之邪半夏生薑之辛以散邪氣兼能燥濕利痰治之瘴本若白芍之酸甲味也大棗甘草之甘己味也甲己化土養脾之妙法也是方李待制立以治瘴扶脾利痰以退半表半裡之邪熱用以桂心佐以柴胡使柴胡之寒不能為柄非神於用藥者不可同語也草果飲治瘴瘧頭痛身疼寒熱脈浮弦草果去殼良薑青皮去穰川芎白芷蘇葉甘草上各等分銼散水煎熱服當發日前連進一服不拘時候四時治要方云風瘧食瘧瘧即瘴也多生於東南謂東南乃魚鹽之地及多暴風風瘧宜草果飲此方用川芎青皮白芷發散風邪良薑蘇葉發散寒熱今咳痰脈浮緊頭痛身疼惡風寒乃感乎凜冽暴風也正宜草果飲因食生冷肥膩中脘生痰嘔逆遂成食瘧宜服二陳湯三因方治食瘧用紅丸子亦為極妙奪命散治傷寒瘴瘧陰陽證候不明誤投藥致病垂困煩躁發渴及婦人産後胎煎受熱瘴等證人參一兩去蘆切片用水二鍾於銀石器內煎至一鍾以冷水沉取冷一服而盡若鼻有汗滴尤妙五苓散治傷寒瘴疾感暑中濕小便不利頭疼身熱煩躁發渴等證夏月主治尤多能伐腎氣下虛者不可過服澤瀉三兩豬苓去皮一兩五錢茯苓去皮一兩五錢肉桂一兩白朮去蘆一兩五錢上為細末每服三錢夏月背寒頭疼發熱無汗小便祕濃煎蔥白湯調熱服令額上有汗為妙或只用百滾湯調熱服仍續啜熱湯沖令汗出冒暑極熱新汲水調亦可熱瘴痢疾小便不利者並用熱水調大便泄小便不利者車前子湯調不宜多服瘀熱在裡發黃疸茵陳湯調或加辰砂尤治蘊熱心煩毛崇甫因母病孝感天地夢投此方可謂神方也但五苓散用桂正如小柴胡用人參備急丸用乾薑之類欲其剛柔相濟亦存戰守之意也故方書謂五苓散無桂及隔年陳者俱不可用如去桂而加人參卻謂之春澤湯治煩躁效烏沉散治瘴疾心腹刺痛調中快氣烏藥一兩香附三兩焙乾甘草一兩炒上共為細末入鹽少許滾湯調服加減五積散治瘴後腰疼腳痛渾身疼蒼朮陳皮厚朴半夏茯苓當歸川芎大肉桂乾薑桔梗甘草枳殼氣弱者不用上姜三片煎服黃耆建中湯治瘴後自汗黃耆白芍肉桂甘草上姜三片棗一枚水煎服異功散治瘴後精神少不喜飲食此藥能調胃進食順氣化痰不冷不燥功效尤多人參白朮陳皮茯苓甘草上各等分姜三片棗一枚水煎服六君子湯治瘴後體倦食少多痰人參白朮茯苓甘草陳皮半夏上各等分姜水煎服如易飢食不多即飽悶者加藿香砂仁名香砂六君湯大養脾丸治同六君湯人參一兩白朮五錢茯苓一兩乾薑二兩炮砂仁二兩麥芽一兩炒甘草一兩五錢上煉蜜為丸每兩八丸每服一丸食前細嚼薑湯下濕疽湯治瘴後虛煩不眠心膽虛怯氣鬱生痰痰與氣搏變生諸證或四肢浮腫心虛煩悶觸事易驚或夢不祥或異象眩惑遂致心驚膽怯半夏一兩五錢枳實一兩陳皮一兩五錢甘草四錢茯苓三兩竹茹上姜七片棗一枚水煎食前熱服如聖餅子治瘴疾嘔逆頭疼及氣厥痰飲防風天麻半夏各五錢生用南星乾薑川烏各一兩川芎甘草上共為末水丸作餅子每服五餅薑湯下六和湯治夏月冒暑伏熱發瘴煩躁口渴及心脾不調霍亂吐瀉或瘧或痢或咳嗽人參砂仁甘草杏仁半夏扁豆藿香茯苓木瓜香薷厚朴上銼散每服四錢姜三片棗一枚煎服參蘇飲治瘴瘧壯熱脈弦數按之不絶頭痛目睛疼人參蘇葉前胡乾葛半夏各二錢茯苓陳皮桔梗甘草枳殼各五錢姜七片棗一枚水煎服不拘時如頭痛目疼加川芎聞之陽氣恆泄之地得疾者雖身熱亦多內寒正經所謂言熱未已寒病復始又王叔和云有熱不可太攻之熱去則寒起是也所以瘴疾熱多卑熱者攝生方衛生方皆以病深而難治參蘇有不當服者且如脈虛內弱煩躁而熱衛生方治以冷湯生薑附子湯甚效余於湟川得周醫云近日三五證熱甚大用附子乾薑入麝香少許汲水調下心間如覺頓涼即覺愈未嘗再服柴平湯治瘴疾十四日外熱尚未除其脈弦數有力柴胡黃芩炒黑人參半夏陳皮甘草蒼朮厚朴上姜三片棗一枚水煎服樂令黃耆湯治瘴疾發熱煩躁引飲大便不通小便赤澀狂言內熱神昏不省黃耆人參陳皮當歸桂心細辛前胡炒芍茯苓半夏甘草麥冬上各等分姜三片棗一枚煎溫服星香湯治啞瘴手足搐搦及痰厥等證氣盛者用之南星八錢木香一錢上每服四錢姜十片水煎服附香飲治啞瘴氣逆及痰厥氣虛者用之大附子八錢炮木香一錢上每服四錢姜十片水煎服以天雄易附子尤妙痰涎壅盛者加全蠍五個仍服黑錫丹鎮墜如六脈俱虛者用三建各一兩木香五錢薑棗煎更磨沉香同服蘇感丸治因食生冷至寒痰上壅作啞瘴及瘴後痰厥或痢初起用蘇合香丸感應丸上各等分和勻如丸如黍米大每服五六十丸薑湯下蘇合丸沉香三兩青木香三兩丁香三兩麝香三兩犀角三兩安息香三兩檀香三兩白朮三兩香附三兩蓽茇三兩硃砂三兩訶子三兩薰陸香一兩冰片一兩蘇合油一兩上將安息香用好酒熬膏入蘇合油和勻余藥為細末入膏油內再加煉蜜為丸蘇子降氣湯治男子虛陽上攻氣不升降上盛下虛壅隔痰響咽喉不利咳嗽虛煩引飲頭昏腳疼腰痛倦怠肚腹刺痛冷熱氣泄大便風祕澀滯不通真蘇子五兩炒當歸三兩前胡三兩厚朴三兩甘草三兩肉桂三兩陳皮三兩半夏三兩上銼散每服姜三片棗一枚煎服不拘時祕傳降風湯治男女上熱下寒之病凡飲食過度致傷脾胃色欲過節耗損真元脾胃不和遂致氣不升降上熱則頭痛目眩或痰涎嘔逆胸膈不快咽喉乾燥飲食無味下虛則腰膝無力大便泄澀裡急後重臍肚冷痛治以涼則脾氣怯弱腸鳴下利治以溫則上焦壅熱口舌生瘡及腳氣上攻與浮腫心煩宜先服此藥然後以所主之藥治之無不效者五加皮五錢酒炒枳殼二兩炒甘草一兩炒草果五錢柴胡一兩陳皮五錢地骨皮兩炒訶子五兩去核半夏五錢桑白皮二兩炒桔梗五錢骨碎補五錢去毛炒上銼散加蘇葉生薑水煎食後服嗽倍半夏上隔熱甚加黃芩下部虛弱甚熟附子如用附子更加生薑女人血虛加當歸瘴疾多上熱而下寒此正張給事所謂陽浮而陰閉也愚嘗謂寓於廣者平居無疾亦須服降氣鎮墜之藥及養正丹黑錫丹然養正丹四藥皆有利性南方陽氣恆泄稍失制度寧免誤人怕服不若黑錫丹降氣藥及蘇子降氣湯祕傳降湯二藥均治上盛下虛然祕傳降氣湯若胃寒氣虛者亦不宜多服得病而上熱下寒者李待制乾薑附子湯法最妙易簡方亦類在降氣湯後更云煎臨時以藥汁磨沉香再煎滾此法最良病退而餘熱在上者正宜服之沉香降氣湯治陰陽壅滯氣不升降胸膈痞塞喘促短氣沉香一兩砂仁一兩香附四兩甘草二兩上為末每服二錢入鹽少許滾湯點服四物湯治婦人瘴病宜調血者此方合瘴瘧諸方用之大川芎當歸熟地白芍上各等分水煎服四七湯治婦人瘴疾中脘痞滿氣不舒快痰涎壅盛及七情氣結成痰或如破絮或如梅核在咽喉之間咯不出咽不下半夏五兩茯苓四兩厚朴三兩紫蘇三兩上每服四錢姜七片棗一枚水煎熱服木香檳榔丸治瘴後痢疾元氣實者腸胃有積裡急後重腹痛頻頻至圊木香一兩檳榔一兩青皮一兩陳皮一兩去白枳殼一兩黃柏一兩三稜醋煨一兩莪朮醋炒一兩當歸一兩黃連一兩香附三兩黃芩二兩大黃三兩黑醜半生半熟取末四兩上為末滴水為丸梧子大每服六七十丸滾湯下香薷飲治瘴後伏暑作痢香薷黃連厚朴扁豆甘草上藥銼散姜三片水煎服香連丸治諸痢川連二十兩用吳萸淨一兩同好酒浸一夕同炒乾去吳萸不用以川連為末南木香一不見火另研為末每連末五兩入木香一兩上共和勻用米醋打老倉米糊為丸梧子大每服五十丸米泔下雙亂丸治赤白痢川連去須蘆吳茱萸去梗上各等分共一處以好酒浸一宿取出揀開曬乾各為細末各麵糊為丸梧子大赤痢用川連丸三十丸甘草湯下白痢用茱萸丸三十丸乾薑湯下赤白相兼各三十丸相合用甘草乾薑湯下斷下方治赤白痢及休息痢瘴病後患痢俱宜此藥草果連殼一個白朮麵炒粟殼十個去肋膜及蒂醋拌炒透茯苓上為粗末共作一劑加姜三片棗三枚烏梅三個赤痢加烏豆七粒白痢加乾薑五分水煎分作二服之真人養臟湯治小兒大人腸胃虛弱患赤白痢或下膿血或如魚腦髓臍腹㽲痛日夜無度大便脫肛人參二錢肉桂五錢訶子一兩去核粟殼三錢六分白朮炒當歸二錢白芍一兩六錢甘草五錢炙肉蔻五錢麵煨木香一兩四錢不見火上銼散每服四錢水煎食前溫服滑瀉及白痢並加熟附子五六片生薑三片冷甚者加乾薑保和丸治內傷飲食致成痢疾元氣祛弱不堪下者山楂二兩去核神麯一兩半夏一兩茯苓一兩陳皮五錢連翹五錢蘿蔔子五錢上為末粥為丸梧子大每服五六十丸滾湯下或原物燒灰調湯下四神丸治瘴後元氣虛弱患痢赤白及脾胃虛清晨溏泄故紙四兩炒五味一兩去核肉蔻二兩面煨吳萸一兩去梗上為末用紅棗六十粒生薑六兩切碎同煮熟去姜將棗肉搗為丸梧桐子大每服五十丸米飲下七味白朮散治下痢虛渴白朮茯苓人參甘草藿香木香乾葛上共銼散水煎溫服補中益氣湯治瘴後痢疾元氣下陷者黃耆二錢人參一錢白朮八分當歸五分陳皮三分甘草一錢升麻三分柴胡三分上姜三片棗一枚水煎溫服四柱散治元氣虛真陽耗臍痛痢不止人參附子茯苓木香上各等分每服四錢姜五片水煎溫服參苓白朮散治瘴後脾胃虛弱飲食不進致嘔吐瀉痢病後此藥最好人參茯苓白朮山藥甘草蓮肉薏米桔梗扁豆砂仁上共為末每服二錢棗湯調下震靈丹治病後虛羸少氣泄痢不止禹餘糧二兩代赭石俱火煅醋淬二兩赤石脂二兩五靈脂二兩乳香二兩沒藥二兩硃砂一兩紫石英四兩三味俱搗碎入砂鍋以瓦蓋口鹽泥固濟候乾用硬炭十斤煅通紅火盡為度入地坑埋出火毒二日夜研末上為末和勻糯米粉糊為丸小芡實大風乾每服三丸用炒故紙棗湯調鍾乳粉少許空心送下敗毒散一名倉廩湯治下痢赤白噤口不食頭疼心煩手足溫脈不虛弱人參桔梗甘草茯苓川芎羌活獨活柴胡前胡枳殼上各等分銼散每服四錢陳倉米百粒姜三片棗二枚水煎溫服進食丹治痢毒熱上衝心肺嘔逆噤口石蓮子去殼上為細末陳倉米煎湯調下補脾丹治痢脾胃虛弱聞食則嘔不思飲食山藥切碎半生半炒熟上為細末陳倉米煎湯調下五皮飲治瘴後飲水過多或食毒物或飲食不節致傷脾氣頭面四肢臍腹腫滿生薑皮茯苓皮大腹皮桑白皮桔紅皮上各等分銼散水煎服病在上食後服病在下食前服忌生冷毒物糕糍實脾散治瀉後脾虛腫滿大附子一兩草果仁一兩大苓子一兩即檳榔乾薑一兩宣木瓜一兩甘草一兩上用水同煎乾一半手劈開附子心不白為度勿令水同干恐近底焦取出割四片焙為末每服三錢空心日午滾湯調服五苓五皮散治瘴後脾氣凝滯面目虛浮四肢腫滿心腹膨脹上氣急促小便不利茯苓皮白朮豬苓澤瀉五加皮肉桂陳皮生薑皮大腹皮地骨皮上各等分每服四錢水煎熱服忌生冷油膩堅硬諸物胃苓湯治瘴後濕勝腫滿蒼朮陳皮川朴甘草肉桂白朮茯苓豬苓澤瀉上各等分用姜一撮水煎熱服木香流氣飲治諸氣痞塞胸膈膨脹走注刺痛氣促痰嗽面目虛浮四肢腫滿大便祕結小便不利青皮四兩陳皮四兩甘草四兩川朴四兩紫蘇四兩香附四兩木通二兩腹皮一兩五錢丁香一兩五分木香一兩五分藿香一兩五分檳榔一兩五分草果一兩五分莪朮一兩五分肉桂一兩五分人參一兩麥冬一兩白朮一兩茯苓一兩枳殼一兩川蒲一兩木瓜一兩白芷一兩半夏一兩上銼散每服五錢姜三片水煎服金匱腎氣丸治脾腎虛寒腰重腳腫濕飲留積小便不利或吐腹腫脹四肢浮腫氣喘痰盛其效如神茯苓三兩附子五錢牛膝一兩肉桂一兩澤瀉一兩車前一兩石棗一兩山藥一兩丹皮一兩熟地四兩上為末和地黃膏煉蜜為丸梧子大每服六七十丸空心米飲下導痰湯治一切痰涎壅盛胸膈留飲痞塞不通南星一兩枳殼一兩陳皮一兩茯苓一兩甘草五錢半夏四兩上銼散每服四錢姜十片水煎溫服通關散治瘴後痰厥昏不知人痰涎上壅牙關緊閉急要諸藥不得下咽喉細辛一兩牙皂一兩半夏一兩上共為細末吹入鼻中候噴嚏得少蘇卻急進藥蜜導法治瘴後有汗過多津液內竭大便不通不妄用下藥惟宜此法蜂蜜四兩上於銚內漫火煉攪之勿令焦候稍冷如糖狀以水濕手捏作錠如拇指大約長二三寸令一頭鋭乘其稍熱納穀道中以手抱住如未效更用一枚火上略炙便溫嚴氏方云蜜三合入豬膽汁二匙在內同煎無膽只如前亦可又一方入皂角五錢在內皆可隨病淺深取用
