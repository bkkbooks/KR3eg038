body:
  text: 自序余賦性孱弱幼嬰多病迨丁年尤甚嘗患內傷諸藥罔效於是悉取內經難經甲乙經東垣十書傷寒六書各論及薛氏等書至於殊國僻壤奇方怪疾皆沿波溯源推詳考索循古人之餘而為之不知其已瘳已人情莫不欲言其所自知交親承是謬推庸多奏效妄意遂謂凡病不出傷寒內傷之範圍也壬寅秋天時熱甚入冬仍不寒四方疫癘大作其證似瘧而寒熱不閒似傷寒而三陽經少陰太陰經證齊似內傷而氣口脈不大於人迎向所妄意以自信者胥失之矣彼以傷寒治者七日逝以內傷治以瘧治者先後亦逝間有染輕本固者稍淹浹旬終歸不起至一發不能言者其死尤速惟輕而不服藥者百起一二即老醫宿匠計與術兩窮矣然天地之大德曰生塞極必有以通之者有宋李待制之書在也書名瘴瘧衛生方專是一證始以風壤闊越一涉獵而置之而後乃知其寶也論證則辨晰周詳用藥則簡易平順此真妙於治也且諸書瘧部亦嘗及瘴瘧矣本末未甚悉豈身履其地傳不獲習乎待制造端王張討潤皆因宦彼地得其真詮是書賴以全予始以一二及十百因沿鄉曲面流疏遠隨手應心刻期色起矣予秘之是以人命為私也告之同業懼不能遍謀梓以廣之區區之公而已客有告之者曰夫瘧何有於瘴哉閩廣之間山深雨淫積嵐為瘴黃霧隱天中人作苦吾信界在中土土不同方風亦殊俗曠絕千里嵐瘴何從母乃巧於署名以炫技乎余曰否否諸疾之作由天時也四時之變由氣數也人身肖天地與氣順逆也易曰觀乎天文以察時變其徵在國國實以人天氣流轉山澤通之以時驗變以人驗時奧氣不藏時之變也物直槎夭人直疾病山川不必同而氣至則行之矣故吾信不必閩廣而氣類之此瘴瘧之所由作也且如癸卯之冬四山花木盎然如春甲辰夏仲菊華如秋六月反擁絮春秋隕霜不殺注謂四時失其序則其施必悖月令仲夏行秋令民殃於疫在昔識之蓋天失其序盩氣旁行於是乎在邇年以來冬復大暖草木禽蟲不含不蟄殆物得氣之先與韓昌黎雪擁藍關句李唐嶺南尚雪今絕無之馴至洛陽杜鵑天氣自南而北不尤信乎客因領之予又謂瘴瘧於文為瘧章言疾彰於外內無實也為瘧如虎反爪向人也以瘧施無實之人故多瀕於死李待制之調劑思深哉不揣愚陋次其源委附以鄙見別傷寒內傷諸瘧之形似詳藥餌之宜用宜禁驗病色之可治弗治編曰瘴瘧指南車僭妄之罪固無所逃然於活人或有小補庸有未盡以俟後之君子萬曆三十七年歲次己酉十月朔信州鄭全望撰
